name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-debs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            arch: arm64
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build debs
        run: |
          for pkg in blit-server-deb blit-cli-deb blit-gateway-deb; do
            nix build .#"$pkg" --no-link --print-out-paths >> outputs.txt
          done

      - name: Collect and verify debs
        run: |
          mkdir -p debs tmp
          for dir in $(cat outputs.txt); do
            cp "$dir"/*.deb debs/
          done
          ls -lh debs/

          # Verify binaries are statically linked
          for deb in debs/*.deb; do
            dpkg-deb -x "$deb" tmp/
          done
          for bin in tmp/usr/bin/*; do
            echo "=== $bin ==="
            file "$bin"
            file "$bin" | grep -qE "static(ally|-pie) linked" || { echo "FATAL: $bin is not static!"; exit 1; }
          done
          rm -rf tmp

      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: debs/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build and verify binaries
        run: |
          mkdir -p stage
          for pkg in blit-server-static blit-cli-static blit-gateway-static; do
            out=$(nix build .#"$pkg" --no-link --print-out-paths)
            cp "$out"/bin/* stage/
          done
          ls -lh stage/

          for bin in stage/*; do
            echo "=== $bin ==="
            otool -L "$bin"
            otool -L "$bin" | grep -v '^\S' | grep -v '/usr/lib/' && { echo "FATAL: $bin links to non-system dylibs!"; exit 1; } || true
          done

      - name: Package tarballs
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for bin in stage/*; do
            name=$(basename "$bin")
            tar -czf "dist/${name}_${version}_darwin_aarch64.tar.gz" -C stage "$name"
          done
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: dist/*.tar.gz

  release:
    needs: [build-debs, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: macos

      - name: List artifacts
        run: |
          ls -lh debs/
          ls -lh macos/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debs/*.deb
            macos/*.tar.gz
          generate_release_notes: true

  apt-repo:
    needs: [build-debs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - name: Import GPG key
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build APT repo
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev

          mkdir -p repo/pool repo/dists/stable/main/binary-amd64
          mkdir -p repo/dists/stable/main/binary-arm64
          cp debs/*.deb repo/pool/
          cp .github/blit.gpg repo/blit.gpg

          cd repo
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-arm64/Packages

          cat > dists/stable/Release <<'RELEASE'
          Origin: blit
          Label: blit
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          RELEASE
          sed -i 's/^          //' dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release
          gpg --batch --yes --armor --detach-sign --output dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --armor --clearsign --output dists/stable/InRelease dists/stable/Release

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - uses: actions/deploy-pages@v4
