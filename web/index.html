            selecting = true;
            selStart = mouseToCell(e);
            selEnd = selStart;
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!e.shiftKey) {
            const t = focusedPty !== null ? terminals[focusedPty] : null;
            if (t && (t.mouse_mode() === 3 || t.mouse_mode() === 4)) {
                const button = e.buttons & 1 ? 0 : e.buttons & 2 ? 2 : e.buttons & 4 ? 1 : 0;
                if (e.buttons || t.mouse_mode() === 4) {
                    sendMouseEvent('move', e, button + 32);
                    return;
                }
            }
        }
        if (selecting) {
            selEnd = mouseToCell(e);
            drawSelection();
        }
    });

    window.addEventListener('mouseup', (e) => {
        if (!e.shiftKey && sendMouseEvent('up', e, e.button)) {
            e.preventDefault();
            return;
        }
        if (!selecting) return;
        selecting = false;
        selEnd = mouseToCell(e);
        drawSelection();
        if (selStart && selEnd && (selStart.row !== selEnd.row || selStart.col !== selEnd.col)) {
            copySelection();
        }
        clearSelection();
        inputSink.focus();
    });

    // Scroll wheel: scrollback when no mouse mode, forward to pty otherwise
    canvas.addEventListener('wheel', (e) => {
        const t = focusedPty !== null ? terminals[focusedPty] : null;
        if (t && t.mouse_mode() > 0) {
            e.preventDefault();
            const button = e.deltaY < 0 ? 64 : 65;
            sendMouseEvent('down', e, button);
        } else {
            e.preventDefault();
            const lines = Math.round(-e.deltaY / 20) || (e.deltaY > 0 ? -3 : 3);
            scroll(lines);
        }
    }, { passive: false });

    canvas.addEventListener('contextmenu', (e) => {
        const t = focusedPty !== null ? terminals[focusedPty] : null;
        if (t && t.mouse_mode() > 0) e.preventDefault();
    });

    canvas.addEventListener('click', () => inputSink.focus());
    // Browsers may ignore programmatic focus() outside a user gesture.
    // Catch the first keypress anywhere on the page and redirect to the sink,
    // then re-dispatch so the keystroke isn't swallowed.
    document.addEventListener('keydown', (e) => {
        if (document.activeElement !== inputSink && !exposeOpen) {
            inputSink.focus();
            inputSink.dispatchEvent(new KeyboardEvent('keydown', e));
        }
    });

    if (savedPass) connect(savedPass, { source: 'stored' });
    else showAuth();
}

function connect(pass, { source = 'prompt' } = {}) {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    statusEl.textContent = 'connecting\u2026';
    const wsURL = (location.protocol === 'https:' ? 'wss:' : 'ws:') +
        '//' + location.host + location.pathname;
    const socket = new WebSocket(wsURL);
    if (ws && ws !== socket) {
        try {
            ws.onclose = null;
            ws.close();
        } catch {}
    }
    ws = socket;
    socket.binaryType = 'arraybuffer';
    let opened = false;
    let authenticated = false;
    let suppressReconnect = false;

    if (source === 'stored') hideAuth();

    socket.onopen = () => {
        if (ws !== socket) return;
        opened = true;
        statusEl.textContent = 'authenticating\u2026';
        socket.send(pass);
    };

    socket.onmessage = (e) => {
        if (ws !== socket) return;
        if (typeof e.data === 'string') {
            if (e.data === 'ok') {
                authenticated = true;
                savedPass = pass;
                writeStorage(PASS_STORAGE_KEY, pass);
                hideAuth();
                workspaceEl.style.display = 'flex';
                statusEl.textContent = '';
                reconnectDelay = 500;
                computeSize();
                resizeCanvasBacking();
                updatePreviewRail();
                inputSink.focus();
            } else if (e.data.startsWith('error:')) {
                // Server-side error after auth (e.g. transport connect failed).
                // Show in status bar and suppress reconnect — retrying would
                // just hit the same error (server not running, socket missing).
                statusEl.textContent = e.data.slice(6);
                suppressReconnect = true;
            } else {
                savedPass = null;
                removeStorage(PASS_STORAGE_KEY);
                showAuth('auth failed');
            }
            return;
        }

        const data = new Uint8Array(e.data);
        if (data.length === 0) return;
        bytesIn += data.length;

        switch (data[0]) {
            case S2C_UPDATE: {
                if (data.length < 3) break;
                const ptyId = data[1] | (data[2] << 8);
                let queue = pendingApplyBatches.get(ptyId);
                if (!queue) {
                    queue = [];
                    pendingApplyBatches.set(ptyId, queue);
                }
                queue.push(data.subarray(3));
                if (ackAheadFrames < MAX_ACK_AHEAD_FRAMES) {
                    sendAckFrames(1);
                    ackAheadFrames += 1;
                } else {
                    deferredAckFrames += 1;
                }
                scheduleApplyPump();
                sendClientMetrics(deferredAckFrames > 0 || pendingApplyFrameCount() > TARGET_PLAYOUT_BACKLOG);
                if (exposeOpen && exposeQuery.trim()) {
                    queueExposeSearch({ contentRefresh: true });
                }
                break;
            }
            case S2C_CREATED: {
                if (data.length < 3) break;
                const id = data[1] | (data[2] << 8);
                const focusCreated = pendingFocusedCreates > 0;
                if (focusCreated) pendingFocusedCreates -= 1;
                if (!ptyIds.includes(id)) ptyIds.push(id);
                if (!terminals[id]) terminals[id] = createTerminalInstance();
                dirtyTerminals.add(id);
                requestPreviewRender([id], true);
                if (focusedPty === null || focusCreated) {
                    if (focusCreated && exposeOpen) closeExpose({ restoreFocus: false });
                    focusPty(id);
                }
                else {
                    if (exposeOpen && exposeQuery.trim()) queueExposeSearch({ contentRefresh: true });
                    schedulePreviewRailUpdate();
                    schedulePtyFollowSync();
                }
                break;
            }
            case S2C_CLOSED: {
                if (data.length < 3) break;
                const id = data[1] | (data[2] << 8);
                ptyIds = ptyIds.filter(x => x !== id);
                ptyLru = ptyLru.filter(x => x !== id);
                if (terminals[id]) { terminals[id].free(); delete terminals[id]; }
                subscribedPtys.delete(id);
                pendingApplyBatches.delete(id);
                terminalHotUntil.delete(id);
                dirtyTerminals.delete(id);
                dirtyPreviewPtys.delete(id);
                delete surfaceCanvases[id];
                delete surfaceRenderers[id];
                removePreviewItem(id);
                delete ptyTitles[id];
                if (focusedPty === id) {
                    focusedPty = ptyIds.length > 0 ? ptyIds[ptyIds.length - 1] : null;
                    if (focusedPty !== null) {
                        focusPty(focusedPty);
                    } else {
                        resetLeadCanvasState();
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        createPty();
                    }
                }
                if (exposeOpen && exposeQuery.trim()) queueExposeSearch({ contentRefresh: true });
                schedulePreviewRailUpdate();
                break;
            }
            case S2C_LIST: {
                if (data.length < 3) break;
                const count = data[1] | (data[2] << 8);
                ptyIds = [];
                for (let i = 0; i < count; i++) {
                    const off = 3 + i * 2;
                    if (off + 1 < data.length) ptyIds.push(data[off] | (data[off + 1] << 8));
                }
                requestPreviewRender(ptyIds, true);
                if (exposeOpen && exposeQuery.trim()) queueExposeSearch({ contentRefresh: true });
                schedulePreviewRailUpdate();
                if (ptyIds.length > 0 && focusedPty === null) focusPty(ptyIds[0]);
                if (ptyIds.length === 0) createPty();
                if (focusedPty !== null) sendResizeForPty(focusedPty);
                schedulePtyFollowSync();
                break;
            }
            case S2C_TITLE: {
                if (data.length < 3) break;
                const id = data[1] | (data[2] << 8);
                const title = textDecoder.decode(data.subarray(3));
                ptyTitles[id] = title;
                if (exposeOpen && exposeQuery.trim()) queueExposeSearch({ contentRefresh: true });
                schedulePreviewRailUpdate();
                if (id === focusedPty) {
                    document.title = title ? `${title} — blit` : 'blit';
                }
                break;
            }
            case S2C_SEARCH_RESULTS: {
                if (data.length < 5 || !exposeOpen || !exposeQuery.trim()) break;
                const requestId = data[1] | (data[2] << 8);
                if (requestId !== exposeSearchRequestId) break;
                exposeSearchInFlight = false;
                exposeSearchPending = exposeSearchTimer !== null;
                if (exposeCreateCommand()) break;
                if (exposeQuery.trim() !== exposeSearchSentQuery) {
                    if (exposeSearchRefreshQueued && !exposeSearchTimer) {
                        exposeSearchRefreshQueued = false;
                        queueExposeSearch({ contentRefresh: true });
                    }
                    break;
                }
                const count = data[3] | (data[4] << 8);
                const results = [];
                let off = 5;
                for (let i = 0; i < count; i++) {
                    if (off + 14 > data.length) break;
                    const ptyId = data[off] | (data[off + 1] << 8);
                    const score = (
                        data[off + 2]
                        | (data[off + 3] << 8)
                        | (data[off + 4] << 16)
                        | (data[off + 5] << 24)
                    ) >>> 0;
                    const primarySource = data[off + 6];
                    const matchedSources = data[off + 7];
                    const rawScrollOffset = (
                        data[off + 8]
                        | (data[off + 9] << 8)
                        | (data[off + 10] << 16)
                        | (data[off + 11] << 24)
                    ) >>> 0;
                    const contextLen = data[off + 12] | (data[off + 13] << 8);
                    off += 14;
                    if (off + contextLen > data.length) break;
                    const context = textDecoder.decode(data.subarray(off, off + contextLen));
                    off += contextLen;
                    results.push({
                        ptyId,
                        score,
                        primarySource,
                        matchedSources,
                        scrollOffset: rawScrollOffset === SEARCH_SCROLL_OFFSET_NONE ? null : rawScrollOffset,
                        context,
                    });
                }
                exposeSearchPending = false;
                exposeSearchResults = results;
                schedulePreviewRailUpdate();
                syncPtyFollows();
                requestPreviewRender(visibleExposePtys(), true);
                if (exposeSearchRefreshQueued) {
                    exposeSearchRefreshQueued = false;
                    queueExposeSearch({ contentRefresh: true });
                }
                break;
            }
        }
    };

    socket.onerror = () => {};

    socket.onclose = () => {
        if (ws !== socket) return;
        ws = null;
        if (!suppressReconnect) statusEl.textContent = 'disconnected';
        if (terminalResizeTimer) {
            clearTimeout(terminalResizeTimer);
            terminalResizeTimer = null;
        }
        endTerminalResize();
        // Reset client state so reconnect starts clean
        for (const id of Object.keys(terminals)) {
            terminals[id].free();
            delete terminals[id];
        }
        surfaceCanvases = {};
        surfaceRenderers = {};
        previewItems = {};
        subscribedPtys = new Set();
        exposeGridEl.innerHTML = '';
        ptyTitles = {};
        ptyIds = [];
        focusedPty = null;
        exposeOpen = false;
        exposeQuery = '';
        exposeSelectedPty = null;
        pendingFocusedCreates = 0;
        resetExposeSearch();
        exposeSearchEl.value = '';
        previewRailEl.classList.remove('visible');
        resetLeadCanvasState();
        document.title = 'blit';
        predicted = '';
        predictedFromCol = 0;
        predictedFromRow = 0;
        scrollOffset = 0;
        leadNeedsRender = false;
        previewNeedsRender = false;
        lastPreviewRenderAt = 0;
        dirtyTerminals = new Set();
        dirtyPreviewPtys = new Set();
        previewLayoutDirty = true;
        pendingApplyBatches = new Map();
        terminalHotUntil = new Map();
        ackAheadFrames = 0;
        deferredAckFrames = 0;
        applyMsEwma = 0;
        applyPumpScheduled = false;
        lastMetricsSentAt = 0;
        lastMetricsBacklog = -1;
        lastMetricsAckAhead = -1;
        lastMetricsApplyMs = -1;
        if (opened && !authenticated) {
            savedPass = null;
            removeStorage(PASS_STORAGE_KEY);
            showAuth(source === 'stored' ? 'saved passphrase failed' : 'auth failed');
            return;
        }
        if (!opened && source === 'prompt') {
            passInput.disabled = false;
        }
        if (savedPass && !suppressReconnect) {
            reconnectTimer = setTimeout(() => {
                statusEl.textContent = 'reconnecting\u2026';
                connect(savedPass, { source: 'stored' });
            }, reconnectDelay);
            reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
        }
    };
}

function sendKey(data) {
    if (focusedPty === null) return;
    const msg = new Uint8Array(3 + data.length);
    msg[0] = C2S_INPUT;
    msg[1] = focusedPty & 0xff;
    msg[2] = (focusedPty >> 8) & 0xff;
    msg.set(data, 3);
    ws.send(msg);
}

function keyToBytes(e) {
    const enc = new TextEncoder();
    const t = focusedPty !== null ? terminals[focusedPty] : null;
    const appCursor = t && t.app_cursor();

    if (e.ctrlKey && !e.altKey && !e.metaKey) {
        // Some platforms return the control char directly as e.key
        const kc = e.key.charCodeAt(0);
        if (e.key.length === 1 && kc >= 1 && kc <= 26) return new Uint8Array([kc]);
        if (e.key.length === 1) {
            const code = e.key.toLowerCase().charCodeAt(0);
            if (code >= 97 && code <= 122) return new Uint8Array([code - 96]);
            if (e.key === '[') return new Uint8Array([0x1b]);
            if (e.key === '\\') return new Uint8Array([0x1c]);
            if (e.key === ']') return new Uint8Array([0x1d]);
        }
    }

    if (e.ctrlKey && e.shiftKey && !e.altKey && !e.metaKey) {
        if (e.key === '?') return new Uint8Array([0x7f]);
        if (e.key === ' ' || e.key === '@') return new Uint8Array([0x00]);
    }

    // Arrow keys with modifier support
    // Modifier param: 1 + (shift?1:0) + (alt?2:0) + (ctrl?4:0) + (meta?8:0)
    const arrows = { ArrowUp: 'A', ArrowDown: 'B', ArrowRight: 'C', ArrowLeft: 'D' };
    if (arrows[e.key]) {
        const mod = (e.shiftKey ? 1 : 0) + (e.altKey ? 2 : 0) + (e.ctrlKey ? 4 : 0) + (e.metaKey ? 8 : 0);
        if (mod) {
            return enc.encode(`\x1b[1;${mod + 1}${arrows[e.key]}`);
        }
        const prefix = appCursor ? '\x1bO' : '\x1b[';
        return enc.encode(prefix + arrows[e.key]);
    }

    const mod = (e.shiftKey ? 1 : 0) + (e.altKey ? 2 : 0) + (e.ctrlKey ? 4 : 0) + (e.metaKey ? 8 : 0);

    // Keys using CSI code ~ format: \x1b[code;modifer~
    const tilde = { PageUp: '5', PageDown: '6', Delete: '3', Insert: '2' };
    if (tilde[e.key]) {
        if (mod) return enc.encode(`\x1b[${tilde[e.key]};${mod + 1}~`);
        return enc.encode(`\x1b[${tilde[e.key]}~`);
    }

    // Home/End: \x1b[1;modH or \x1b[H
    const he = { Home: 'H', End: 'F' };
    if (he[e.key]) {
        if (mod) return enc.encode(`\x1b[1;${mod + 1}${he[e.key]}`);
        return enc.encode(`\x1b[${he[e.key]}`);
    }

    // F1-F4: SS3 format, with modifiers use CSI
    const f14 = { F1: 'P', F2: 'Q', F3: 'R', F4: 'S' };
    if (f14[e.key]) {
        if (mod) return enc.encode(`\x1b[1;${mod + 1}${f14[e.key]}`);
        return enc.encode(`\x1bO${f14[e.key]}`);
    }

    // F5-F12: tilde format
    const fkeys = { F5: '15', F6: '17', F7: '18', F8: '19', F9: '20', F10: '21', F11: '23', F12: '24' };
    if (fkeys[e.key]) {
        if (mod) return enc.encode(`\x1b[${fkeys[e.key]};${mod + 1}~`);
        return enc.encode(`\x1b[${fkeys[e.key]}~`);
    }

    const simple = { Enter: '\r', Backspace: '\x7f', Tab: '\t', Escape: '\x1b' };
    if (simple[e.key]) return enc.encode(simple[e.key]);

    if (e.altKey && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
        const code = e.key.charCodeAt(0);
        if (code >= 0x20 && code <= 0x7e) return enc.encode('\x1b' + e.key);
        return enc.encode(e.key);
    }

    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        return enc.encode(e.key);
    }

    return null;
}

main().catch(console.error);
</script>
