name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#tests

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

  build-debs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build and verify debs
        run: |
          mkdir -p tmp
          for pkg in blit-server-deb blit-cli-deb blit-gateway-deb; do
            echo "=== $pkg ==="
            out=$(nix build .#"$pkg" --no-link --print-out-paths)
            for deb in "$out"/*.deb; do
              dpkg-deb -x "$deb" tmp/
            done
          done
          for bin in tmp/usr/bin/*; do
            echo "=== $bin ==="
            file "$bin"
            file "$bin" | grep -qE "static(ally|-pie) linked" || { echo "FATAL: $bin is not static!"; exit 1; }
          done
          rm -rf tmp

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build and verify binaries
        run: |
          mkdir -p stage
          for pkg in blit-server-static blit-cli-static blit-gateway-static; do
            out=$(nix build .#"$pkg" --no-link --print-out-paths)
            cp "$out"/bin/* stage/
          done
          for bin in stage/*; do
            echo "=== $bin ==="
            file "$bin"
            file "$bin" | grep -qE "static(ally|-pie) linked" || { echo "FATAL: $bin is not static!"; exit 1; }
          done

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build and verify binaries
        run: |
          mkdir -p stage
          for pkg in blit-server-static blit-cli-static blit-gateway-static; do
            out=$(nix build .#"$pkg" --no-link --print-out-paths)
            cp "$out"/bin/* stage/
          done
          for bin in stage/*; do
            echo "=== $bin ==="
            otool -L "$bin"
            otool -L "$bin" | grep -v '^\S' | grep -v '/usr/lib/' | grep -v '/System/Library/' && { echo "FATAL: $bin links to non-system dylibs!"; exit 1; } || true
          done
