version: "0.5"

processes:
  browser-wasm:
    command: cargo watch -w browser/src -w remote/src -s "./bin/build-browser"
    availability:
      restart: always
    readiness_probe:
      exec:
        command: test -f browser/pkg/blit_browser.js
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 300

  server:
    command: cargo watch -w server/src -w remote/src -w alacritty-driver/src -x "run -p blit-server --release -- --socket /tmp/blit-dev.sock"
    availability:
      restart: always

  gateway:
    command: cargo watch -w gateway/src -w webserver/src -x "run -p blit-gateway --release"
    environment:
      - BLIT_PASS=${BLIT_PASS:-dev}
      - BLIT_SOCK=/tmp/blit-dev.sock
      - BLIT_ADDR=127.0.0.1:3266
      - BLIT_CORS=*
      - BLIT_QUIC=1
    depends_on:
      server:
        condition: process_started
    availability:
      restart: always
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3266
        path: /
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 300

  web-app:
    command: cd web-app && npx vite --host
    environment:
      - VITE_BLIT_GATEWAY=localhost:3266
    depends_on:
      browser-wasm:
        condition: process_healthy
      gateway:
        condition: process_healthy
    availability:
      restart: always
