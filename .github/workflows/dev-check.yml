name: dev-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dev-check:
    name: dev-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run dev-check
        run: nix develop --command ./bin/dev-check
