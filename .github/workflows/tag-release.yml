name: Tag release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'release ')
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and create tag
        run: |
          version=$(perl -ne 'if (/^\s*version = "([^"]+)";$/) { print "$1\n"; exit 0 }' nix/common.nix)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Could not read version from nix/common.nix, skipping"
            exit 0
          fi
          if ! echo "$COMMIT_MSG" | grep -qF "release $version"; then
            echo "Commit message does not mention release $version, skipping"
            exit 0
          fi
          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping"
            exit 0
          fi
          git tag "$tag"
          git push origin "$tag"
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
