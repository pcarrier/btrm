<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>blit</title>
<style>
:root {
    --terminal-font: PragmataPro, ui-monospace, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: var(--terminal-font); }
canvas { display: block; outline: none; }
#workspace {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
}
#lead-pane {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    background: #000;
}
#lead-pane canvas {
    cursor: text;
    position: absolute;
    top: 0;
    left: 0;
    image-rendering: pixelated;
    transform-origin: top left;
    will-change: transform;
    backface-visibility: hidden;
}
#preview-rail {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 8;
    background: rgba(3, 4, 6, 0.64);
    backdrop-filter: blur(18px) saturate(1.08);
    overflow-y: auto;
    padding: 24px;
}
#preview-rail.visible {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: exposeOverlayIn 120ms cubic-bezier(0.22, 1, 0.36, 1);
}
#expose-head {
    width: min(100%, 1320px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
#preview-rail.visible #expose-head {
    animation: exposeHeadIn 135ms cubic-bezier(0.2, 0.9, 0.2, 1);
}
#expose-toolbar {
    display: block;
}
#expose-grid-shell {
    width: min(100%, 1320px);
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    gap: 12px;
}
#expose-search {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    background: rgba(18,22,28,0.72);
    color: #eef3f8;
    padding: 16px 18px;
    font: 15px/1.2 var(--terminal-font);
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 30px rgba(0,0,0,0.14);
}
#expose-search::placeholder {
    color: #6f7a86;
}
#expose-create {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    margin-top: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(18,22,28,0.68);
    color: #eef3f8;
    font: 20px/1 var(--terminal-font);
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 26px rgba(0,0,0,0.12);
    transition: transform 90ms ease, border-color 90ms ease, background 90ms ease;
}
#expose-create:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.24);
    background: rgba(28,34,42,0.78);
}
#expose-create.selected {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 18px 48px rgba(0,0,0,0.34), inset 0 0 0 1px rgba(255,255,255,0.18);
    color: #fff;
}
#expose-create:focus-visible {
    outline: 1px solid rgba(133, 197, 255, 0.7);
    outline-offset: 2px;
}
#expose-hint {
    color: #7c8896;
    font: 12px/1.3 var(--terminal-font);
    min-height: 1.3em;
}
#expose-grid {
    flex: 1 1 auto;
    min-width: 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    align-content: start;
}
#expose-grid.search-results {
    width: min(100%, 1080px);
    grid-template-columns: minmax(0, 1fr);
}
.preview-card {
    background: linear-gradient(180deg, rgba(19,23,29,0.78), rgba(10,13,18,0.82));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px;
    color: #a1acb7;
    cursor: pointer;
    box-shadow: 0 14px 36px rgba(0,0,0,0.14);
    transition: transform 100ms ease, border-color 100ms ease, box-shadow 100ms ease, color 100ms ease, background 100ms ease;
}
.preview-card:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.18);
    color: #d9e2ea;
    background: linear-gradient(180deg, rgba(24,29,36,0.84), rgba(12,16,22,0.88));
}
.preview-card.active {
    border-color: rgba(133, 197, 255, 0.48);
    box-shadow: inset 0 0 0 1px rgba(133, 197, 255, 0.22);
    color: #f2f7fb;
}
.preview-card.selected {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 18px 48px rgba(0,0,0,0.34), inset 0 0 0 1px rgba(255,255,255,0.18);
    color: #fff;
}
#preview-rail.visible .preview-card {
    animation: exposeCardIn 140ms cubic-bezier(0.18, 0.88, 0.22, 1) both;
    animation-delay: calc(var(--expose-order, 0) * 12ms);
}
@media (max-width: 760px) {
    #expose-grid-shell {
        flex-direction: column;
        gap: 10px;
    }
    #expose-create {
        margin-top: 0;
    }
}
.preview-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    font: 12px/1.25 var(--terminal-font);
    margin-bottom: 10px;
}
.preview-title-wrap {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1 1 auto;
}
.preview-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 6px;
    flex: 0 0 auto;
}
.preview-surface {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 10px;
    background: #000;
    contain: paint;
    border: 1px solid rgba(255,255,255,0.06);
}
.preview-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.preview-context {
    display: none;
    color: #8e9aa8;
    font: 12px/1.4 var(--terminal-font);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.preview-role {
    color: #728091;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
}
.preview-badge {
    padding: 4px 7px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: #90a0b2;
    font: 10px/1 var(--terminal-font);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.preview-badge.match {
    color: #d9e8f8;
    border-color: rgba(133, 197, 255, 0.28);
    background: rgba(133, 197, 255, 0.08);
}
.preview-card.search-result {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(220px, 320px);
    gap: 16px;
    align-items: start;
}
.preview-card.search-result .preview-head {
    margin-bottom: 0;
}
.preview-card.search-result .preview-context {
    display: block;
}
.preview-card.search-result .preview-surface {
    min-height: 120px;
}
@media (max-width: 860px) {
    .preview-card.search-result {
        grid-template-columns: minmax(0, 1fr);
    }
}
.preview-canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    cursor: pointer;
    transform-origin: top left;
    will-change: transform;
    backface-visibility: hidden;
}
@keyframes exposeOverlayIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}
@keyframes exposeHeadIn {
    from {
        opacity: 0;
        transform: translateY(-8px) scale(0.992);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
@keyframes exposeCardIn {
    from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
#input-sink {
    position: fixed; top: -9999px; left: -9999px;
    width: 1px; height: 1px; opacity: 0;
    font: 13px var(--terminal-font); border: none; resize: none;
    white-space: pre; overflow: hidden;
}
#hud {
    position: fixed; top: 0; right: 0;
    color: #444; font: 10px/1 var(--terminal-font);
    padding: 2px 6px; pointer-events: none; z-index: 2;
}
#auth {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #ccc; font: 14px/1 var(--terminal-font); text-align: center;
}
#auth input {
    background: #222; color: #ccc; border: 1px solid #555;
    font: 14px/1 var(--terminal-font); padding: 4px 8px; margin-top: 8px; outline: none;
}
#status {
    position: fixed; bottom: 4px; left: 50%; transform: translateX(-50%);
    color: #888; font: 12px/1 var(--terminal-font); pointer-events: none; z-index: 2;
}
.selection-overlay {
    position: fixed; background: rgba(100,150,255,0.3); pointer-events: none; z-index: 1;
}
#help-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 10; justify-content: center; align-items: center;
}
#help-overlay.visible { display: flex; }
#help-box {
    background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
    padding: 20px 28px; color: #ccc; font: 13px/2 var(--terminal-font);
    max-width: 420px;
}
#help-box h2 { font-size: 14px; margin: 0 0 10px; color: #fff; }
#help-box kbd {
    background: #333; border: 1px solid #555; border-radius: 3px;
    padding: 1px 5px; font-size: 12px; color: #eee;
}
</style>
</head>
<body>
<div id="hud"></div>
<div id="auth">passphrase<br><input type="password" id="pass" autofocus></div>
<div id="status"></div>
<div id="workspace">
<div id="lead-pane"><canvas id="term" tabindex="0"></canvas></div>
<div id="preview-rail">
<div id="expose-head">
<div id="expose-toolbar">
<input id="expose-search" type="text" placeholder="Switch PTY by title or content, or >command" autocomplete="off" spellcheck="false">
</div>
<div id="expose-hint"></div>
</div>
<div id="expose-grid-shell">
<button id="expose-create" type="button" title="New PTY" aria-label="New PTY">+</button>
<div id="expose-grid"></div>
</div>
</div>
</div>
<textarea id="input-sink" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus></textarea>
<div id="help-overlay"><div id="help-box">
<h2>Shortcuts</h2>
<kbd>Ctrl</kbd>/<kbd>Cmd</kbd>+<kbd>K</kbd> &mdash; Expose / switch PTY<br>
<kbd>Ctrl</kbd>/<kbd>Cmd</kbd>+<kbd>Shift</kbd>+<kbd>Enter</kbd> &mdash; New PTY<br>
Type <kbd>&gt;</kbd><em>command</em> in Expose and press <kbd>Enter</kbd> &mdash; New PTY running that command<br>
<kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>W</kbd> &mdash; Close PTY<br>
<kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>B</kbd> &mdash; Toggle backlog<br>
<kbd>Shift</kbd>+<kbd>PageUp</kbd>/<kbd>PageDown</kbd> &mdash; Scroll back/forward<br>
<kbd>Ctrl</kbd>+<kbd>?</kbd> &mdash; Toggle this help
</div></div>
<script type="module">
const { default: init, Terminal } = await import('/blit_browser.js');

const DEFAULT_FONT = '"PragmataPro Liga", "PragmataPro", ui-monospace, monospace';
const PASS_STORAGE_KEY = 'blit.passphrase';
const FONT_STORAGE_KEY = 'blit.fontFamily';
const USE_WEBGL_LEAD = true;
const BG_OP_STRIDE = 4;
const GLYPH_OP_STRIDE = 8;
const C2S_INPUT = 0x00, C2S_RESIZE = 0x01, C2S_SCROLL = 0x02, C2S_ACK = 0x03, C2S_DISPLAY_RATE = 0x04, C2S_CLIENT_METRICS = 0x05, C2S_CREATE = 0x10, C2S_FOCUS = 0x11, C2S_CLOSE = 0x12, C2S_SUBSCRIBE = 0x13, C2S_UNSUBSCRIBE = 0x14, C2S_SEARCH = 0x15;
const S2C_UPDATE = 0x00, S2C_CREATED = 0x01, S2C_CLOSED = 0x02, S2C_LIST = 0x03, S2C_TITLE = 0x04, S2C_SEARCH_RESULTS = 0x05;
const SEARCH_SOURCE_TITLE = 0x00, SEARCH_SOURCE_VISIBLE = 0x01, SEARCH_SOURCE_SCROLLBACK = 0x02;
const SEARCH_MATCH_TITLE = 1 << 0, SEARCH_MATCH_VISIBLE = 1 << 1, SEARCH_MATCH_SCROLLBACK = 1 << 2;
const EXPOSE_CREATE_SELECTION = '__create__';
const SEARCH_SCROLL_OFFSET_NONE = 0xffffffff;

const hud = document.getElementById('hud');
const authEl = document.getElementById('auth');
const passInput = document.getElementById('pass');
const statusEl = document.getElementById('status');
const workspaceEl = document.getElementById('workspace');
const leadPaneEl = document.getElementById('lead-pane');
const previewRailEl = document.getElementById('preview-rail');
const exposeGridEl = document.getElementById('expose-grid');
const exposeSearchEl = document.getElementById('expose-search');
const exposeCreateEl = document.getElementById('expose-create');
const exposeHintEl = document.getElementById('expose-hint');
const canvas = document.getElementById('term');
const ctx = canvas.getContext('2d');
const leadScratchCanvas = document.createElement('canvas');
const leadScratchCtx = leadScratchCanvas.getContext('2d');
const surfaceScratchCanvas = document.createElement('canvas');
const surfaceScratchCtx = surfaceScratchCanvas.getContext('2d');
const previewCompositeCanvas = document.createElement('canvas');
const inputSink = document.getElementById('input-sink');
const colorCssCache = new Map();
const exposeSearchEncoder = new TextEncoder();
const textDecoder = new TextDecoder();

function configureCanvasContext(ctx) {
    if (ctx) ctx.imageSmoothingEnabled = false;
    return ctx;
}

function compileGlShader(gl, type, source) {
    const shader = gl.createShader(type);
    if (!shader) return null;
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        return shader;
    }
    gl.deleteShader(shader);
    return null;
}

function createGlProgram(gl, vertexSource, fragmentSource) {
    const vertexShader = compileGlShader(gl, gl.VERTEX_SHADER, vertexSource);
    const fragmentShader = compileGlShader(gl, gl.FRAGMENT_SHADER, fragmentSource);
    if (!vertexShader || !fragmentShader) return null;
    const program = gl.createProgram();
    if (!program) return null;
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    gl.deleteShader(vertexShader);
    gl.deleteShader(fragmentShader);
    if (gl.getProgramParameter(program, gl.LINK_STATUS)) {
        return program;
    }
    gl.deleteProgram(program);
    return null;
}

function createLeadGlRenderer(canvasEl) {
    const gl = canvasEl.getContext('webgl', {
        alpha: true,
        antialias: false,
        depth: false,
        stencil: false,
        premultipliedAlpha: true,
        // These canvases are later sampled by 2D drawImage() for lead/preview
        // presentation, so we need a stable buffer to read from even under
        // heavy update rates.
        preserveDrawingBuffer: true,
    });
    if (!gl) {
        return {
            supported: false,
            hide() {
                canvasEl.style.display = 'none';
            },
            resize(width, height) {
                if (canvasEl.width !== width) canvasEl.width = width;
                if (canvasEl.height !== height) canvasEl.height = height;
            },
            render() {
                return false;
            },
            renderViews() {
                return false;
            },
        };
    }

    const rectProgram = createGlProgram(
        gl,
        `
attribute vec2 a_pos;
attribute vec4 a_color;
uniform vec2 u_resolution;
varying vec4 v_color;

void main() {
    vec2 zeroToOne = a_pos / u_resolution;
    vec2 zeroToTwo = zeroToOne * 2.0;
    vec2 clip = zeroToTwo - 1.0;
    gl_Position = vec4(clip * vec2(1.0, -1.0), 0.0, 1.0);
    v_color = a_color;
}
        `,
        `
precision mediump float;
varying vec4 v_color;

void main() {
    gl_FragColor = vec4(v_color.rgb * v_color.a, v_color.a);
}
        `,
    );
    const glyphProgram = createGlProgram(
        gl,
        `
attribute vec2 a_pos;
attribute vec2 a_uv;
attribute vec4 a_color;
uniform vec2 u_resolution;
varying vec2 v_uv;
varying vec4 v_color;

void main() {
    vec2 zeroToOne = a_pos / u_resolution;
    vec2 zeroToTwo = zeroToOne * 2.0;
    vec2 clip = zeroToTwo - 1.0;
    gl_Position = vec4(clip * vec2(1.0, -1.0), 0.0, 1.0);
    v_uv = a_uv;
    v_color = a_color;
}
        `,
        `
precision mediump float;
varying vec2 v_uv;
varying vec4 v_color;
uniform sampler2D u_texture;

void main() {
    vec4 tex = texture2D(u_texture, v_uv);
    // White/grayscale glyphs (premultiplied: r≈g≈b≈a): tint with vertex color.
    // Color emoji (premultiplied: channels differ): use native texture RGB.
    float minC = min(tex.r, min(tex.g, tex.b));
    float maxC = max(tex.r, max(tex.g, tex.b));
    float isGray = step(maxC - minC, 0.02);
    vec3 tinted = v_color.rgb * tex.a;
    gl_FragColor = vec4(mix(tex.rgb, tinted, isGray), tex.a);
}
        `,
    );
    if (!rectProgram || !glyphProgram) {
        return {
            supported: false,
            hide() {
                canvasEl.style.display = 'none';
            },
            resize(width, height) {
                if (canvasEl.width !== width) canvasEl.width = width;
                if (canvasEl.height !== height) canvasEl.height = height;
            },
            render() {
                return false;
            },
            renderViews() {
                return false;
            },
        };
    }

    const rectBuffer = gl.createBuffer();
    const glyphBuffer = gl.createBuffer();
    const atlasTexture = gl.createTexture();
    const rectPositionLoc = gl.getAttribLocation(rectProgram, 'a_pos');
    const rectColorLoc = gl.getAttribLocation(rectProgram, 'a_color');
    const rectResolutionLoc = gl.getUniformLocation(rectProgram, 'u_resolution');
    const glyphPositionLoc = gl.getAttribLocation(glyphProgram, 'a_pos');
    const glyphUvLoc = gl.getAttribLocation(glyphProgram, 'a_uv');
    const glyphColorLoc = gl.getAttribLocation(glyphProgram, 'a_color');
    const glyphResolutionLoc = gl.getUniformLocation(glyphProgram, 'u_resolution');
    const glyphTextureLoc = gl.getUniformLocation(glyphProgram, 'u_texture');
    let uploadedAtlasVersion = -1;
    let uploadedAtlasCanvas = null;

    gl.disable(gl.DEPTH_TEST);
    gl.disable(gl.CULL_FACE);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
    gl.bindTexture(gl.TEXTURE_2D, atlasTexture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

    function hide() {
        canvasEl.style.display = 'none';
    }

    function show() {
        canvasEl.style.display = '';
    }

    function resize(width, height) {
        if (canvasEl.width !== width) canvasEl.width = width;
        if (canvasEl.height !== height) canvasEl.height = height;
    }

    function ensureAtlas(atlasCanvas, version) {
        if (!atlasCanvas) return false;
        if (atlasCanvas === uploadedAtlasCanvas && (version >>> 0) === (uploadedAtlasVersion >>> 0)) {
            return true;
        }
        gl.bindTexture(gl.TEXTURE_2D, atlasTexture);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, atlasCanvas);
        uploadedAtlasCanvas = atlasCanvas;
        uploadedAtlasVersion = version >>> 0;
        return true;
    }

    // Max vertices per draw call — keeps GPU buffers reasonable on all drivers.
    const MAX_BATCH_VERTS = 65532; // divisible by 6 (triangles) and 3

    function drawColoredTriangles(data) {
        if (!data.length || !rectBuffer) return;
        const floatsPerVert = 6;
        const totalVerts = data.length / floatsPerVert;
        gl.useProgram(rectProgram);
        gl.bindBuffer(gl.ARRAY_BUFFER, rectBuffer);
        gl.enableVertexAttribArray(rectPositionLoc);
        gl.enableVertexAttribArray(rectColorLoc);
        gl.uniform2f(rectResolutionLoc, canvasEl.width, canvasEl.height);
        for (let off = 0; off < totalVerts; off += MAX_BATCH_VERTS) {
            const count = Math.min(MAX_BATCH_VERTS, totalVerts - off);
            const slice = data.subarray(off * floatsPerVert, (off + count) * floatsPerVert);
            gl.bufferData(gl.ARRAY_BUFFER, slice, gl.DYNAMIC_DRAW);
            gl.vertexAttribPointer(rectPositionLoc, 2, gl.FLOAT, false, 24, 0);
            gl.vertexAttribPointer(rectColorLoc, 4, gl.FLOAT, false, 24, 8);
            gl.drawArrays(gl.TRIANGLES, 0, count);
        }
    }

    function drawSolidRect(x1, y1, x2, y2, r, g, b, a) {
        drawColoredTriangles(new Float32Array([
            x1, y1, r, g, b, a,
            x2, y1, r, g, b, a,
            x1, y2, r, g, b, a,
            x1, y2, r, g, b, a,
            x2, y1, r, g, b, a,
            x2, y2, r, g, b, a,
        ]));
    }

    function renderRectangles(bgOps, offsetX = 0, offsetY = 0, scaleX = 1, scaleY = 1) {
        if (!bgOps.length) return;
        const data = new Float32Array((bgOps.length / BG_OP_STRIDE) * 36);
        let offset = 0;
        for (let i = 0; i < bgOps.length; i += BG_OP_STRIDE) {
            const row = bgOps[i];
            const col = bgOps[i + 1];
            const colSpan = bgOps[i + 2];
            const packed = bgOps[i + 3];
            const x1 = offsetX + col * cell.pw * scaleX;
            const y1 = offsetY + row * cell.ph * scaleY;
            const x2 = x1 + colSpan * cell.pw * scaleX;
            const y2 = y1 + cell.ph * scaleY;
            const r = ((packed >>> 16) & 0xff) / 255;
            const g = ((packed >>> 8) & 0xff) / 255;
            const b = (packed & 0xff) / 255;
            const a = 1;
            data.set([
                x1, y1, r, g, b, a,
                x2, y1, r, g, b, a,
                x1, y2, r, g, b, a,
                x1, y2, r, g, b, a,
                x2, y1, r, g, b, a,
                x2, y2, r, g, b, a,
            ], offset);
            offset += 36;
        }
        drawColoredTriangles(data);

function sendAckFrames(count) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    for (let i = 0; i < count; i++) {
        ws.send(ACK_MSG);
    }
}

function pendingApplyFrameCount() {
    let total = 0;
    for (const queue of pendingApplyBatches.values()) total += queue.length;
    return total;
}

function pendingLeadApplyCount() {
    if (focusedPty === null) return 0;
    const queue = pendingApplyBatches.get(focusedPty);
    return queue ? queue.length : 0;
}

function terminalUsesCookedFastPath(ptyId) {
    const t = terminals[ptyId];
    return !!(t && t.echo() && t.icanon());
}

function markTerminalHot(ptyId, appliedFrames, appliedBytes, queueRemaining) {
    if (terminalUsesCookedFastPath(ptyId)) {
        terminalHotUntil.delete(ptyId);
        return;
    }
    const now = performance.now();
    if (
        appliedFrames >= FULL_REPAINT_HOT_FRAMES
        || appliedBytes >= FULL_REPAINT_HOT_BYTES
        || queueRemaining > 0
    ) {
        terminalHotUntil.set(ptyId, now + FULL_REPAINT_HOLD_MS);
        return;
    }
    const hotUntil = terminalHotUntil.get(ptyId) || 0;
    if (hotUntil <= now) terminalHotUntil.delete(ptyId);
}

function terminalNeedsFullRepaint(ptyId) {
    if (terminalUsesCookedFastPath(ptyId)) return false;
    return (terminalHotUntil.get(ptyId) || 0) > performance.now();
}

const applyPumpChannel = new MessageChannel();
applyPumpChannel.port1.onmessage = () => {
    applyPumpScheduled = false;
    applyQueuedUpdates(APPLY_BUDGET_MS);
    if (pendingApplyFrameCount() > 0 && !(leadNeedsRender && pendingLeadApplyCount() > 0)) {
        scheduleApplyPump();
    }
};

function scheduleApplyPump() {
    if (applyPumpScheduled) return;
    applyPumpScheduled = true;
    applyPumpChannel.port2.postMessage(0);
}

function sendClientMetrics(force = false) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const now = performance.now();
    const backlog = Math.min(65535, pendingApplyFrameCount() + ackAheadFrames + deferredAckFrames);
    const ackAhead = Math.min(65535, ackAheadFrames);
    const applyMs = Math.min(65535, Math.round(applyMsEwma * 10));
    const backlogChanged = lastMetricsBacklog < 0 || Math.abs(backlog - lastMetricsBacklog) >= 2;
    const backlogPhaseChanged = lastMetricsBacklog < 0
        || (backlog > TARGET_PLAYOUT_BACKLOG) !== (lastMetricsBacklog > TARGET_PLAYOUT_BACKLOG);
    const applyChanged = lastMetricsApplyMs < 0 || Math.abs(applyMs - lastMetricsApplyMs) >= 5;
    const urgent = backlogChanged || backlogPhaseChanged || ackAhead !== lastMetricsAckAhead || applyChanged;
    if (!force && now - lastMetricsSentAt < METRICS_MIN_INTERVAL_MS && !urgent) {
        return;
    }
    if (!force && backlog === lastMetricsBacklog && ackAhead === lastMetricsAckAhead
        && applyMs === lastMetricsApplyMs) {
        return;
    }
    lastMetricsSentAt = now;
    lastMetricsBacklog = backlog;
    lastMetricsAckAhead = ackAhead;
    lastMetricsApplyMs = applyMs;
    ws.send(new Uint8Array([
        C2S_CLIENT_METRICS,
        backlog & 0xff, (backlog >> 8) & 0xff,
        ackAhead & 0xff, (ackAhead >> 8) & 0xff,
        applyMs & 0xff, (applyMs >> 8) & 0xff,
    ]));
}

function releaseAppliedFrames(appliedFrames) {
    if (appliedFrames <= 0) return;
    const consumedAhead = Math.min(ackAheadFrames, appliedFrames);
    ackAheadFrames -= consumedAhead;
    const freedAckSlots = appliedFrames - consumedAhead;
    const releaseDeferred = Math.min(deferredAckFrames, freedAckSlots);
    if (releaseDeferred > 0) {
        deferredAckFrames -= releaseDeferred;
        sendAckFrames(releaseDeferred);
    }
}

function applyQueuedUpdates(budgetMs = Infinity) {
    const orderedIds = focusedPty !== null
        ? [focusedPty, ...ptyIds.filter(id => id !== focusedPty)]
        : [...pendingApplyBatches.keys()];
    const startedAt = performance.now();
    let totalConsumed = 0;
    let totalRendered = 0;
    let totalApplyMs = 0;
    let titlesChanged = false;
    const changedPtys = new Set();

    for (const ptyId of orderedIds) {
        if (performance.now() - startedAt >= budgetMs) break;
        const queue = pendingApplyBatches.get(ptyId);
        if (!queue || queue.length === 0) continue;
        if (ptyId === focusedPty && leadNeedsRender) continue;
        if (!terminals[ptyId]) {
            terminals[ptyId] = createTerminalInstance();
        }
        const applyStart = performance.now();
        const batchLimit = ptyId === focusedPty ? LEAD_APPLY_BATCH_LIMIT : APPLY_BATCH_FRAME_LIMIT;
        const applyCount = Math.min(queue.length, Math.max(
            1,
            Math.min(batchLimit, queue.length - TARGET_PLAYOUT_BACKLOG),
        ));
        let appliedBytes = 0;
        // Apply in small chunks, checking the budget between each, so we
        // yield back to the browser event loop promptly.  This prevents
        // long synchronous WASM calls from blocking clicks and input.
        let applied = 0;
        while (applied < applyCount) {
            const chunkEnd = Math.min(applied + 4, applyCount);
            let total = 0;
            for (let i = applied; i < chunkEnd; i++) total += 4 + queue[i].length;
            const batch = new Uint8Array(total);
            let off = 0;
            for (let i = applied; i < chunkEnd; i++) {
                const payload = queue[i];
                const len = payload.length;
                batch[off] = len & 0xff;
                batch[off + 1] = (len >> 8) & 0xff;
                batch[off + 2] = (len >> 16) & 0xff;
                batch[off + 3] = (len >> 24) & 0xff;
                off += 4;
                batch.set(payload, off);
                off += len;
            }
            terminals[ptyId].feed_compressed_batch(batch);
            appliedBytes += total;
            applied += chunkEnd - applied;
            if (performance.now() - startedAt >= budgetMs) break;
        }
        queue.splice(0, applied);
        if (queue.length === 0) pendingApplyBatches.delete(ptyId);
        markTerminalHot(ptyId, applied, appliedBytes, queue.length);
        const title = terminals[ptyId].title();
        if (title !== ptyTitles[ptyId]) {
            ptyTitles[ptyId] = title;
            titlesChanged = true;
            if (ptyId === focusedPty) {
                document.title = title ? `${title} — blit` : 'blit';
            }
        }
        dirtyTerminals.add(ptyId);
        changedPtys.add(ptyId);
        if (ptyId === focusedPty) notePredictionAdvance();
        totalConsumed += applied;
        totalRendered += applied;
        totalApplyMs += performance.now() - applyStart;
    }

    if (totalConsumed > 0) {
        releaseAppliedFrames(totalConsumed);
    }
    if (totalRendered > 0) {
        const applyMsPerFrame = totalApplyMs / totalRendered;
        applyMsEwma = applyMsEwma > 0
            ? applyMsEwma * 0.8 + applyMsPerFrame * 0.2
            : applyMsPerFrame;
        if (focusedPty !== null && changedPtys.has(focusedPty)) requestLeadRender();
        if (changedPtys.size > 0) requestPreviewRender(changedPtys);
        if (titlesChanged) schedulePreviewRailUpdate();
    }
    if (totalConsumed > 0) {
        sendClientMetrics(pendingApplyFrameCount() > TARGET_PLAYOUT_BACKLOG);
    }
    return totalConsumed;
}

function measureCell() {
    const s = document.createElement('span');
    s.style.cssText = `font: 13px ${fontFamily}; position: absolute; visibility: hidden; white-space: pre;`;
    s.textContent = 'M';
    document.body.appendChild(s);
    const r = s.getBoundingClientRect();
    document.body.removeChild(s);
    // Snap to device pixel boundaries so adjacent cells tile without
    // subpixel gaps, then convert back to CSS pixels.
    const d = window.devicePixelRatio || 1;
    // Store exact integer device-pixel dimensions (pw/ph) to avoid
    // IEEE 754 round-trip drift in w*dpr.
    const pw = Math.round(r.width * d);
    const ph = Math.round(r.height * d);
    return { w: pw / d, h: ph / d, pw, ph };
}

function computeSize() {
    const leadWidth = Math.max(leadPaneEl.clientWidth || window.innerWidth, cell.w);
    cols = Math.floor(leadWidth / cell.w);
    rows = Math.floor(window.innerHeight / cell.h);
    if (cols < 1) cols = 1;
    if (rows < 1) rows = 1;
}

function followPty(id) {
    if (subscribedPtys.has(id)) return;
    subscribedPtys.add(id);
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(new Uint8Array([C2S_SUBSCRIBE, id & 0xff, (id >> 8) & 0xff]));
}

function releasePtyRuntime(id) {
    pendingApplyBatches.delete(id);
    terminalHotUntil.delete(id);
    dirtyTerminals.delete(id);
    dirtyPreviewPtys.delete(id);
    if (terminals[id]) {
        terminals[id].free();
        delete terminals[id];
    }
}

function unfollowPty(id) {
    if (!subscribedPtys.has(id)) return;
    subscribedPtys.delete(id);
    releasePtyRuntime(id);
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(new Uint8Array([C2S_UNSUBSCRIBE, id & 0xff, (id >> 8) & 0xff]));
    }
}

function removePreviewItem(id) {
    const item = previewItems[id];
    if (!item) return;
    item.root.remove();
    delete previewItems[id];
}

function visibleExposePtys() {
    return exposeOpen ? filteredExposeIds() : [];
}

function desiredFollowPtys() {
    const desired = new Set();
    if (focusedPty !== null) desired.add(focusedPty);
    if (exposeOpen) {
        for (const id of visibleExposePtys()) desired.add(id);
    }
    return desired;
}

function syncPtyFollows() {
    const desired = desiredFollowPtys();
    for (const id of ptyIds) {
        if (desired.has(id)) followPty(id);
        else unfollowPty(id);
    }
}

function schedulePtyFollowSync() {
    if (followSyncScheduled) return;
    followSyncScheduled = true;
    requestAnimationFrame(() => {
        followSyncScheduled = false;
        syncPtyFollows();
    });
}

function ensureSurface(ptyId) {
    if (!surfaceCanvases[ptyId]) {
        const canvas = document.createElement('canvas');
        surfaceCanvases[ptyId] = canvas;
        surfaceRenderers[ptyId] = createLeadGlRenderer(canvas);
        surfaceRenderers[ptyId].hide();
    }
    return surfaceCanvases[ptyId];
}

function ensurePreviewItem(ptyId) {
    if (previewItems[ptyId]) return previewItems[ptyId];
    const root = document.createElement('div');
    root.className = 'preview-card';
    root.onclick = () => {
        const result = searchResultForPty(ptyId);
        if (exposeOpen) closeExpose({ restoreFocus: false });
        focusPty(ptyId, { scrollOffsetOverride: result ? result.scrollOffset : null });
    };
    const head = document.createElement('div');
    head.className = 'preview-head';
    const titleWrap = document.createElement('div');
    titleWrap.className = 'preview-title-wrap';
    const label = document.createElement('div');
    label.className = 'preview-label';
    const context = document.createElement('div');
    context.className = 'preview-context';
    titleWrap.appendChild(label);
    titleWrap.appendChild(context);
    const meta = document.createElement('div');
    meta.className = 'preview-meta';
    const role = document.createElement('div');
    role.className = 'preview-badge';
    const source = document.createElement('div');
    source.className = 'preview-badge match';
    meta.appendChild(role);
    meta.appendChild(source);
    head.appendChild(titleWrap);
    head.appendChild(meta);
    const surface = document.createElement('div');
    surface.className = 'preview-surface';
    const canvas = document.createElement('canvas');
    canvas.className = 'preview-canvas';
    root.appendChild(head);
    surface.appendChild(canvas);
    root.appendChild(surface);
    exposeGridEl.appendChild(root);
    const item = {
        root,
        label,
        context,
        role,
        source,
        surface,
        canvas,
        ctx: configureCanvasContext(canvas.getContext('2d')),
        committedWidthCss: 0,
        committedHeightCss: 0,
    };
    previewItems[ptyId] = item;
    dirtyPreviewPtys.add(ptyId);
    previewLayoutDirty = true;
    return item;
}

function updatePreviewRail() {
    const filtered = syncExposeSelection();
    const filteredSet = new Set(filtered);
    const filteredOrder = new Map(filtered.map((id, idx) => [id, idx]));
    const createCommand = exposeCreateCommand();
    const searchActive = exposeOpen && !!exposeQuery.trim() && !createCommand;
    const searchResultById = new Map(
        (exposeSearchResults || []).map((result) => [result.ptyId, result])
    );
    const active = new Set(ptyIds);
    for (const [id, item] of Object.entries(previewItems)) {
        if (!active.has(Number(id))) {
            removePreviewItem(Number(id));
            dirtyPreviewPtys.delete(Number(id));
        }
    }
    exposeGridEl.classList.toggle('search-results', searchActive);
    for (const id of ptyIds) {
        const item = ensurePreviewItem(id);
        const title = ptyTitles[id];
        const result = searchResultById.get(id) || null;
        item.label.textContent = title ? `${id}: ${title}` : `#${id}`;
        item.role.textContent = id === focusedPty ? 'Lead' : 'PTY';
        item.context.textContent = searchActive && result && result.context ? result.context : '';
        item.context.style.display = searchActive && result && result.context ? '' : 'none';
        item.source.textContent = searchActive && result ? sourceLabel(result.primarySource) : '';
        item.source.style.display = searchActive && result ? '' : 'none';
        item.source.title = searchActive && result ? resultBadges(result).join(' + ') : '';
        item.root.classList.toggle('active', id === focusedPty);
        item.root.classList.toggle('selected', exposeOpen && id === exposeSelectedPty);
        item.root.classList.toggle('search-result', searchActive);
        item.root.style.display = !exposeOpen || filteredSet.has(id) ? '' : 'none';
        const order = filteredOrder.get(id) ?? 999;
        item.root.style.order = String(order);
        item.root.style.setProperty('--expose-order', String(Math.min(order, 12)));
    }
    exposeCreateEl.classList.toggle('selected', exposeOpen && exposeSelectedPty === EXPOSE_CREATE_SELECTION);
    if (exposeOpen) {
        // Scroll selected card into view.
        if (exposeSelectedPty !== null && exposeSelectedPty !== EXPOSE_CREATE_SELECTION) {
            const item = previewItems[exposeSelectedPty];
            if (item) item.root.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
        const shortcutHint = ' • Ctrl-N new • Ctrl-W kill';
        if (createCommand) {
            exposeHintEl.textContent = `Enter to run "${createCommand}" in a new PTY • Esc to close`;
        } else if (filtered.length > 0) {
            exposeHintEl.textContent = exposeSearchPending && exposeQuery.trim() && exposeSearchResults === null
                ? 'Searching titles, terminal, and scrollback…'
                : `${filtered.length} match${filtered.length === 1 ? '' : 'es'} • Enter to switch${shortcutHint} • Esc to close${exposeSearchPending ? ' • Updating…' : ''}`;
        } else {
            exposeHintEl.textContent = exposeSearchPending && exposeQuery.trim()
                ? 'Searching titles, terminal, and scrollback…'
                : 'No PTYs match that search yet';
        }
        exposeCreateEl.title = createCommand ? `Run "${createCommand}" in a new PTY` : 'New PTY';
        exposeCreateEl.setAttribute('aria-label', exposeCreateEl.title);
    } else {
        exposeHintEl.textContent = '';
        exposeCreateEl.title = 'New PTY';
        exposeCreateEl.setAttribute('aria-label', 'New PTY');
    }
    schedulePtyFollowSync();
}

function previewCanvasWidthCss(item) {
    const measured = item.surface.clientWidth;
    if (measured > 0) return measured;
    const style = getComputedStyle(item.root);
    const paddingX = parseFloat(style.paddingLeft || '0') + parseFloat(style.paddingRight || '0');
    return Math.max(140, Math.floor(item.root.clientWidth - paddingX));
}

function previewCanvasSizeCss(ptyId, item) {
    const surface = surfaceCanvases[ptyId];
    const terminal = terminals[ptyId];
    const widthCss = Math.max(140, Math.round(previewCanvasWidthCss(item)));
    const aspect = surface
        ? surface.height / Math.max(1, surface.width)
        : ((terminal ? terminal.rows : rows) * cell.h) / Math.max(1, (terminal ? terminal.cols : cols) * cell.w);
    const heightCss = Math.max(84, Math.round(widthCss * aspect));
    return { surface, widthCss, heightCss };
}

function ensurePreviewCanvasSize(item, widthCss, heightCss) {
    item.surface.style.height = `${heightCss}px`;
    const pixelW = Math.max(1, Math.round(widthCss * dpr));
    const pixelH = Math.max(1, Math.round(heightCss * dpr));
    const resized = item.canvas.width !== pixelW || item.canvas.height !== pixelH;
    if (resized) {
        item.canvas.width = pixelW;
        item.canvas.height = pixelH;
        configureCanvasContext(item.ctx);
    }
    item.canvas.style.width = '100%';
    item.canvas.style.height = '100%';
    item.canvas.style.transform = 'translateZ(0)';
    item.committedWidthCss = widthCss;
    item.committedHeightCss = heightCss;
    return { pixelW, pixelH, resized };
}

function setGpuScaledCanvas(canvasEl, baseWidthCss, baseHeightCss, targetWidthCss, targetHeightCss) {
    const safeTargetWidth = Math.max(1, targetWidthCss);
    const safeTargetHeight = Math.max(1, targetHeightCss);
    const safeBaseWidth = Math.max(1, baseWidthCss || safeTargetWidth);
    const safeBaseHeight = Math.max(1, baseHeightCss || safeTargetHeight);
    canvasEl.style.width = `${safeBaseWidth}px`;
    canvasEl.style.height = `${safeBaseHeight}px`;
    canvasEl.style.transform = `translateZ(0) scale(${safeTargetWidth / safeBaseWidth}, ${safeTargetHeight / safeBaseHeight})`;
}

function scheduleResizeVisual() {
    if (terminalResizeVisualScheduled) return;
    terminalResizeVisualScheduled = true;
    requestAnimationFrame(() => {
        terminalResizeVisualScheduled = false;
        if (!terminalResizeActive) return;
        setGpuScaledCanvas(
            canvas,
            leadCanvasCssWidth,
            leadCanvasCssHeight,
            Math.max(1, Math.round(leadPaneEl.clientWidth)),
            Math.max(1, Math.round(leadPaneEl.clientHeight)),
        );
        for (const id of ptyIds) {
            const item = previewItems[id];
            if (!item) continue;
            const { widthCss, heightCss } = previewCanvasSizeCss(id, item);
            item.surface.style.height = `${heightCss}px`;
            setGpuScaledCanvas(
                item.canvas,
                item.committedWidthCss,
                item.committedHeightCss,
                widthCss,
                heightCss,
            );
        }
    });
}

function beginTerminalResize() {
    terminalResizeActive = true;
    scheduleResizeVisual();
}

function endTerminalResize() {
    terminalResizeActive = false;
    canvas.style.transform = 'translateZ(0)';
    for (const item of Object.values(previewItems)) {
        item.canvas.style.transform = 'translateZ(0)';
    }
}

function rasterizeTerminal(ptyId) {
    const t = terminals[ptyId];
    if (!t) return;
    const surface = ensureSurface(ptyId);
    const renderer = surfaceRenderers[ptyId];
    const sw = Math.max(1, t.cols * cell.pw);
    const sh = Math.max(1, t.rows * cell.ph);
    if (surface.width !== sw || surface.height !== sh) {
        renderer.resize(sw, sh);
    }
    t.prepare_render_ops();
    let full = t.last_render_full();
    if (!full && t.last_render_scroll_rows()) {
        // The GL surface can't pixel-shift; redo as full repaint.
        t.prepare_full_render_ops();
        full = true;
    }
    renderer.render(
        t.background_ops(),
        t.glyph_ops(),
        t.glyph_atlas_canvas(),
        t.glyph_atlas_version(),
        t.cursor_visible(),
        t.cursor_col,
        t.cursor_row,
        full,
    );
    dirtyTerminals.delete(ptyId);
}

function leadDamageRect(ptyId, surface, drawW, drawH) {
    const t = terminals[ptyId];
    if (!t) return null;
    const rowStart = t.last_render_damage_row_start();
    const rowEnd = t.last_render_damage_row_end();
    const colStart = t.last_render_damage_col_start();
    const colEnd = t.last_render_damage_col_end();
    if (rowStart < 0 || rowEnd <= rowStart || colStart < 0 || colEnd <= colStart) {
        return null;
    }
    const x = Math.max(0, colStart * cell.pw);
    const y = Math.max(0, rowStart * cell.ph);
    const x2 = Math.min(drawW, Math.min(surface.width, colEnd * cell.pw));
    const y2 = Math.min(drawH, Math.min(surface.height, rowEnd * cell.ph));
    if (x2 <= x || y2 <= y) return null;
    return { x, y, w: x2 - x, h: y2 - y };
}

function applyLeadScroll(deltaRows, drawW, drawH) {
    applyCanvasScroll(ctx, canvas, leadScratchCanvas, leadScratchCtx, deltaRows, drawW, drawH);
}

function renderLead() {
    let rerasterizedLead = false;
    if (focusedPty !== null && dirtyTerminals.has(focusedPty)) {
        rasterizeTerminal(focusedPty);
        rerasterizedLead = true;
    }
    if (focusedPty === null || !surfaceCanvases[focusedPty]) {
        if (leadCanvasPrimed) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            resetLeadCanvasState();
        }
        return;
    }
    const t = terminals[focusedPty];
    const surface = surfaceCanvases[focusedPty];
    const drawW = Math.min(canvas.width, surface.width);
    const drawH = Math.min(canvas.height, surface.height);
    const fullRender = !leadCanvasPrimed
        || leadCanvasPty !== focusedPty
        || leadCanvasDrawWidth !== drawW
        || leadCanvasDrawHeight !== drawH
        || !t
        || (rerasterizedLead && t.last_render_full());
    if (fullRender) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(surface, 0, 0, drawW, drawH, 0, 0, drawW, drawH);
    } else if (rerasterizedLead) {
        const scrollRows = t.last_render_scroll_rows();
        if (scrollRows) {
            applyLeadScroll(scrollRows, drawW, drawH);
        }
        const damage = leadDamageRect(focusedPty, surface, drawW, drawH);
        if (damage) {
            ctx.drawImage(
                surface,
                damage.x, damage.y, damage.w, damage.h,
                damage.x, damage.y, damage.w, damage.h,
            );
        }
    }
    if (rerasterizedLead && t) {
        drawOverflowText(ctx, t, { drawWidth: drawW, drawHeight: drawH });
    }
    leadCanvasPrimed = true;
    leadCanvasPty = focusedPty;
    leadCanvasDrawWidth = drawW;
    leadCanvasDrawHeight = drawH;
}

function renderPreviews() {
    if (!exposeOpen) return;
    const ids = visibleExposePtys();
    if (previewCompositeRenderer.supported && ids.length > 0) {
        const entries = [];
        let compositeWidth = 1;
        let compositeHeight = 0;
        for (const id of ids) {
            const item = ensurePreviewItem(id);
            const { widthCss, heightCss } = previewCanvasSizeCss(id, item);
            const { pixelW, pixelH } = ensurePreviewCanvasSize(item, widthCss, heightCss);
            entries.push({ id, item, pixelW, pixelH, srcY: compositeHeight });
            compositeWidth = Math.max(compositeWidth, pixelW);
            compositeHeight += pixelH;
        }
        previewCompositeRenderer.resize(compositeWidth, Math.max(1, compositeHeight));
        const views = [];
        for (const entry of entries) {
            const terminal = terminals[entry.id];
            if (!terminal) continue;
            terminal.prepare_full_render_ops();
            views.push({
                x: 0,
                y: entry.srcY,
                width: entry.pixelW,
                height: entry.pixelH,
                baseWidth: Math.max(1, terminal.cols * cell.pw),
                baseHeight: Math.max(1, terminal.rows * cell.ph),
                bgOps: terminal.background_ops(),
                glyphOps: terminal.glyph_ops(),
                atlasCanvas: terminal.glyph_atlas_canvas(),
                atlasVersion: terminal.glyph_atlas_version(),
                cursorVisible: terminal.cursor_visible(),
                cursorCol: terminal.cursor_col,
                cursorRow: terminal.cursor_row,
            });
        }
        previewCompositeRenderer.renderViews(views);
        for (const entry of entries) {
            entry.item.ctx.fillStyle = '#000';
            entry.item.ctx.fillRect(0, 0, entry.item.canvas.width, entry.item.canvas.height);
            entry.item.ctx.drawImage(
                previewCompositeCanvas,
                0, entry.srcY, entry.pixelW, entry.pixelH,
                0, 0, entry.item.canvas.width, entry.item.canvas.height,
            );
            const terminal = terminals[entry.id];
            drawOverflowText(entry.item.ctx, terminal, {
                drawWidth: entry.item.canvas.width,
                drawHeight: entry.item.canvas.height,
            });
        }
        dirtyPreviewPtys.clear();
        previewLayoutDirty = false;
        return;
    }
    for (const id of ids) {
        if (dirtyTerminals.has(id)) rasterizeTerminal(id);
        const item = ensurePreviewItem(id);
        const { surface, widthCss, heightCss } = previewCanvasSizeCss(id, item);
        const { resized } = ensurePreviewCanvasSize(item, widthCss, heightCss);
        if (!previewLayoutDirty && !resized && !dirtyPreviewPtys.has(id)) continue;
        item.ctx.fillStyle = '#000';
        item.ctx.fillRect(0, 0, item.canvas.width, item.canvas.height);
        if (!surface) continue;
        const scale = item.canvas.width / Math.max(1, surface.width);
        const drawW = item.canvas.width;
        const drawH = Math.min(item.canvas.height, Math.round(surface.height * scale));
        const dy = Math.floor((item.canvas.height - drawH) / 2);
        item.ctx.drawImage(surface, 0, 0, surface.width, surface.height, 0, dy, drawW, drawH);
        const terminal = terminals[id];
        if (terminal) {
            terminal.prepare_full_render_ops();
            drawOverflowText(item.ctx, terminal, {
                offsetY: dy,
                drawWidth: drawW,
                drawHeight: drawH,
            });
        }
    }
    dirtyPreviewPtys.clear();
    previewLayoutDirty = false;
}

function touchLru(id) {
    const idx = ptyLru.indexOf(id);
    if (idx > 0) ptyLru.splice(idx, 1);
    if (idx !== 0) ptyLru.unshift(id);
}

function focusPty(id, { scrollOffsetOverride = null } = {}) {
    const previous = focusedPty;
    focusedPty = id;
    touchLru(id);
    scrollOffset = Number.isFinite(scrollOffsetOverride) && scrollOffsetOverride > 0
        ? Math.floor(scrollOffsetOverride)
        : 0;
    predicted = '';
    resetLeadCanvasState();
    if (previous !== null && previous !== id) invalidateTerminal(previous);
    invalidateTerminal(id);
    schedulePtyFollowSync();
    updatePreviewRail();
    const title = ptyTitles[id];
    document.title = title ? `${title} — blit` : 'blit';
    if (ws && ws.readyState === WebSocket.OPEN) {
        const msg = new Uint8Array(3);
        msg[0] = C2S_FOCUS;
        msg[1] = id & 0xff;
        msg[2] = (id >> 8) & 0xff;
        ws.send(msg);
        sendResizeForPty(id);
        if (scrollOffset > 0) {
            sendScrollForPty(id, scrollOffset);
        }

    resizeCanvasBacking();
    requestLeadRender();
    requestPreviewRender(null, true);
    updateHud();
    inputSink.focus();
}

function createPty(command = null) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    computeSize();
    const commandText = typeof command === 'string' ? command.trim() : '';
    const commandBytes = commandText ? exposeSearchEncoder.encode(commandText) : null;
    const msg = new Uint8Array(5 + (commandBytes ? commandBytes.length : 0));
    msg[0] = C2S_CREATE;
    msg[1] = rows & 0xff;
    msg[2] = (rows >> 8) & 0xff;
    msg[3] = cols & 0xff;
    msg[4] = (cols >> 8) & 0xff;
    if (commandBytes) msg.set(commandBytes, 5);
    ws.send(msg);
}

function createFocusedPty(command = null) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return false;
    pendingFocusedCreates += 1;
    createPty(command);
    return true;
}

function createPtyFromExpose() {
    createFocusedPty(exposeCreateCommand());
}

function closePty(id) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = new Uint8Array(3);
    msg[0] = C2S_CLOSE;
    msg[1] = id & 0xff;
    msg[2] = (id >> 8) & 0xff;
    ws.send(msg);
}

function sendResizeForPty(ptyId) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = new Uint8Array(7);
    msg[0] = C2S_RESIZE;
    msg[1] = ptyId & 0xff;
    msg[2] = (ptyId >> 8) & 0xff;
    msg[3] = rows & 0xff;
    msg[4] = (rows >> 8) & 0xff;
    msg[5] = cols & 0xff;
    msg[6] = (cols >> 8) & 0xff;
    ws.send(msg);
}

function sendScrollForPty(ptyId, offset) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = new Uint8Array(7);
    msg[0] = C2S_SCROLL;
    msg[1] = ptyId & 0xff;
    msg[2] = (ptyId >> 8) & 0xff;
    msg[3] = offset & 0xff;
    msg[4] = (offset >> 8) & 0xff;
    msg[5] = (offset >> 16) & 0xff;
    msg[6] = (offset >> 24) & 0xff;
    ws.send(msg);
}

function scroll(delta) {
    if (focusedPty === null) return;
    scrollOffset = Math.max(0, scrollOffset + delta);
    sendScrollForPty(focusedPty, scrollOffset);
    updateHud();
}

function commitResize() {
    if (terminalResizeTimer) {
        clearTimeout(terminalResizeTimer);
        terminalResizeTimer = null;
    }
    dpr = window.devicePixelRatio || 1;
    cell = measureCell();
    computeSize();
    resizeCanvasBacking();
    for (const id of Object.keys(terminals)) {
        terminals[id].set_cell_size(cell.pw, cell.ph);
        dirtyTerminals.add(Number(id));
    }
    if (focusedPty !== null) sendResizeForPty(focusedPty);
    requestLeadRender();
    requestPreviewRender(null, true);
    schedulePtyFollowSync();
    updateHud();
    endTerminalResize();
}

let lastResizeCommit = 0;
function sendResize(options = {}) {
    const flush = options && options.flush === true;
    beginTerminalResize();
    if (flush) {
        if (terminalResizeTimer) { clearTimeout(terminalResizeTimer); terminalResizeTimer = null; }
        lastResizeCommit = performance.now();
        commitResize();
        return;
    }
    // Throttle: commit at least every TERMINAL_RESIZE_DEBOUNCE_MS during
    // continuous resizing, instead of deferring indefinitely.
    const elapsed = performance.now() - lastResizeCommit;
    if (elapsed >= TERMINAL_RESIZE_DEBOUNCE_MS) {
        if (terminalResizeTimer) { clearTimeout(terminalResizeTimer); terminalResizeTimer = null; }
        lastResizeCommit = performance.now();
        commitResize();
    } else if (!terminalResizeTimer) {
        terminalResizeTimer = setTimeout(() => {
            terminalResizeTimer = null;
            lastResizeCommit = performance.now();
            commitResize();
        }, TERMINAL_RESIZE_DEBOUNCE_MS - elapsed);
    }
}

function resizeCanvasBacking() {
    const cssWidth = Math.max(1, Math.round(leadPaneEl.clientWidth));
    const cssHeight = Math.max(1, Math.round(leadPaneEl.clientHeight));
    const canvasW = Math.max(1, Math.round(cssWidth * dpr));
    const canvasH = Math.max(1, Math.round(cssHeight * dpr));
    if (canvas.width !== canvasW || canvas.height !== canvasH) {
        canvas.width = canvasW;
        canvas.height = canvasH;
        configureCanvasContext(ctx);
        resetLeadCanvasState();
    }
    canvas.style.width = `${cssWidth}px`;
    canvas.style.height = `${cssHeight}px`;
    canvas.style.transform = 'translateZ(0)';
    leadCanvasCssWidth = cssWidth;
    leadCanvasCssHeight = cssHeight;
}

function updateHud() {
    let text = `${cols}\u00d7${rows}  ${fps} fps  ${kbps} kB/s`;
    if (scrollOffset > 0) text += `  [scroll -${scrollOffset}]`;
    hud.textContent = text;
}

function mouseToCell(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        row: Math.min(Math.max(Math.floor((e.clientY - rect.top) / cell.h), 0), rows - 1),
        col: Math.min(Math.max(Math.floor((e.clientX - rect.left) / cell.w), 0), cols - 1),
    };
}

// Terminal mouse event encoding
function sendMouseEvent(type, e, button) {
    const t = focusedPty !== null ? terminals[focusedPty] : null;
    if (!t || t.mouse_mode() === 0) return false;

    const pos = mouseToCell(e);
    const enc = t.mouse_encoding();

    if (enc === 2) {
        // SGR encoding: \x1b[<button;col+1;row+1M or m
        const suffix = type === 'up' ? 'm' : 'M';
        const seq = `\x1b[<${button};${pos.col + 1};${pos.row + 1}${suffix}`;
        sendKey(new TextEncoder().encode(seq));
    } else {
        // Default encoding: \x1b[M btn+32 col+33 row+33
        if (type === 'up') button = 3; // release
        const seq = new Uint8Array([
            0x1b, 0x5b, 0x4d,
            button + 32,
            pos.col + 33,
            pos.row + 33,
        ]);
        sendKey(seq);
    }
    return true;
}

function clearSelection() {
    for (const el of selOverlays) el.remove();
    selOverlays = [];
    selStart = selEnd = null;
}

function drawSelection() {
    for (const el of selOverlays) el.remove();
    selOverlays = [];
    if (!selStart || !selEnd) return;

    let sr = selStart.row, sc = selStart.col;
    let er = selEnd.row, ec = selEnd.col;
    if (sr > er || (sr === er && sc > ec)) {
        [sr, sc, er, ec] = [er, ec, sr, sc];
    }

    const rect = canvas.getBoundingClientRect();
    for (let r = sr; r <= er; r++) {
        const c0 = r === sr ? sc : 0;
        const c1 = r === er ? ec : cols - 1;
        const el = document.createElement('div');
        el.className = 'selection-overlay';
        el.style.left = (rect.left + c0 * cell.w) + 'px';
        el.style.top = (rect.top + r * cell.h) + 'px';
        el.style.width = ((c1 - c0 + 1) * cell.w) + 'px';
        el.style.height = cell.h + 'px';
        document.body.appendChild(el);
        selOverlays.push(el);
    }
}

function copySelection() {
    if (!selStart || !selEnd || focusedPty === null || !terminals[focusedPty]) return;
    let sr = selStart.row, sc = selStart.col;
    let er = selEnd.row, ec = selEnd.col;
    if (sr > er || (sr === er && sc > ec)) {
        [sr, sc, er, ec] = [er, ec, sr, sc];
    }
    const t = terminals[focusedPty];
    const text = t.get_text(sr, sc, er, ec);
    const html = t.get_html(sr, sc, er, ec);
    if (text) {
        navigator.clipboard.write([new ClipboardItem({
            'text/plain': new Blob([text], { type: 'text/plain' }),
            'text/html': new Blob([html], { type: 'text/html' }),
        })]);
    }
}

async function main() {
    await init();
    applyFontChoice(fontFamily, { persist: true });
    dpr = window.devicePixelRatio || 1;
    cell = measureCell();
    computeSize();

    setInterval(() => {
        const now = performance.now();
        const dt = (now - lastFpsTime) / 1000;
        fps = Math.round(frames / dt);
        kbps = Math.round(bytesIn / dt / 1024);
        frames = 0;
        bytesIn = 0;
        lastFpsTime = now;
        updateHud();
    }, 1000);

    function renderLoop(now) {
        // Measure rAF fps and report to server when it changes.
        if (rafPrevTime > 0) {
            const dt = now - rafPrevTime;
            if (dt > 0 && dt < 500) {
                rafFpsEwma = rafFpsEwma * 0.8 + (1000 / dt) * 0.2;
                const rounded = Math.round(rafFpsEwma / 5) * 5; // quantize to nearest 5
                const advertised = Math.max(
                    displayFpsTarget,
                    Math.max(10, Math.min(1000, rounded)),
                );
                if (advertised !== lastReportedFps && ws && ws.readyState === WebSocket.OPEN) {
                    lastReportedFps = advertised;
                    const fps = advertised;
                    ws.send(new Uint8Array([C2S_DISPLAY_RATE, fps & 0xff, (fps >> 8) & 0xff]));
                }
            }
        }
        rafPrevTime = now;

        const renderPreviewNow = previewRenderDue(now);
        if (leadNeedsRender || renderPreviewNow) {
            const didLeadRender = leadNeedsRender;
            if (leadNeedsRender) {
                renderLead();
                leadNeedsRender = false;
            }
            if (renderPreviewNow) {
                renderPreviews();
                previewNeedsRender = false;
                lastPreviewRenderAt = now;
            }
            const t = focusedPty !== null ? terminals[focusedPty] : null;
            const cw = cell.pw, ch = cell.ph;
            let predLen = 0;
            if (didLeadRender && predicted && t && t.echo()) {
                const cr = t.cursor_row, cc = t.cursor_col;
                // Draw predicted text at half opacity on main canvas (not offscreen)
                ctx.font = `${Math.round(ch)}px ${fontFamily}`;
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = 'rgba(204,204,204,0.5)';
                for (let i = 0; i < predicted.length && cc + i < cols; i++) {
                    ctx.fillText(predicted[i], (cc + i) * cw, cr * ch + ch);
                    predLen++;
                }
                // Draw cursor after predicted text
                if (cc + predLen < cols) {
                    ctx.fillStyle = 'rgba(204,204,204,0.5)';
                    ctx.fillRect((cc + predLen) * cw, cr * ch, cw, ch);
                }
            }
            frames++;
        }
        if (!leadNeedsRender && pendingLeadApplyCount() > 0) {
            scheduleApplyPump();
        }
        requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    passInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const pass = passInput.value;
        if (!pass) return;
        passInput.disabled = true;
        connect(pass, { source: 'prompt' });
    });

    window.addEventListener('resize', sendResize);
    window.addEventListener('pointerup', () => { document.body.style.userSelect = ''; });
    const repaintForFocusChange = () => {
        invalidateAllTerminals(true);
    };
    const resyncOnVisible = () => {
        if (!document.hidden) {

            // while the tab was hidden. Remeasure everything.
            sendResize({ flush: true });
        }
    };
    window.addEventListener('focus', repaintForFocusChange);
    window.addEventListener('blur', repaintForFocusChange);
    document.addEventListener('visibilitychange', resyncOnVisible);
    previewRailEl.addEventListener('click', (e) => {
        if (e.target === previewRailEl) closeExpose();
    });
    exposeSearchEl.addEventListener('input', () => {
        exposeQuery = exposeSearchEl.value;
        queueExposeSearch();
        updatePreviewRail();
        requestPreviewRender(null, true);
        schedulePtyFollowSync();
    });
    exposeCreateEl.addEventListener('click', () => {
        createPtyFromExpose();
    });
    exposeSearchEl.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'k') {
            e.preventDefault();
            closeExpose();
            return;
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && !e.altKey && e.key === 'Enter') {
            e.preventDefault();
            const command = exposeCreateCommand();
            closeExpose({ restoreFocus: false });
            createFocusedPty(command);
            return;
        }
        if (e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey && e.key.toLowerCase() === 'n') {
            e.preventDefault();
            closeExpose({ restoreFocus: false });
            createFocusedPty();
            return;
        }
        if (e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey && e.key.toLowerCase() === 'w') {
            e.preventDefault();
            const ids = syncExposeSelection();
            if (exposeSelectedPty !== null && exposeSelectedPty !== EXPOSE_CREATE_SELECTION && ids.includes(exposeSelectedPty)) {
                closePty(exposeSelectedPty);
            }
            return;
        }
        if (e.key === 'Escape') {
            e.preventDefault();
            closeExpose();
            return;
        }
        if (e.key === 'Enter') {
            e.preventDefault();
            acceptExposeSelection();
            return;
        }
        if (e.key === 'ArrowRight') { e.preventDefault(); moveExposeSelection('right'); return; }
        if (e.key === 'ArrowLeft') { e.preventDefault(); moveExposeSelection('left'); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); moveExposeSelection('down'); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); moveExposeSelection('up'); return; }
    });

    const helpOverlay = document.getElementById('help-overlay');
    function toggleHelp() { helpOverlay.classList.toggle('visible'); }
    helpOverlay.addEventListener('click', (e) => { if (e.target === helpOverlay) toggleHelp(); });

    // Keyboard
    inputSink.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'k') {
            e.preventDefault();
            if (exposeOpen) closeExpose();
            else openExpose();
            return;
        }

        if ((e.ctrlKey || e.metaKey) && e.shiftKey && !e.altKey && e.key === 'Enter') {
            e.preventDefault();
            if (exposeOpen) {
                const command = exposeCreateCommand();
                closeExpose({ restoreFocus: false });

        if (e.isComposing) return;

            if (e.key === 'B') {
                e.preventDefault();

                    if (scrollOffset > 0) {
                        scrollOffset = 0;
                        sendScrollForPty(focusedPty, 0);

                        scroll(rows);

            }
            if ((e.key === '}' || e.code === 'BracketRight') && ptyIds.length > 1 && focusedPty !== null) {

                focusPty(ptyIds[(ptyIds.indexOf(focusedPty) + 1) % ptyIds.length]);

            }

        if (e.shiftKey && !e.ctrlKey && !e.altKey && !e.metaKey) {

            if (e.key === 'PageDown') { e.preventDefault(); scroll(-rows); return; }
        }

        if (e.key === 'Dead') return;

        // Any real input resets scroll to live
        if (scrollOffset > 0) {
            scrollOffset = 0;
            sendScrollForPty(focusedPty, 0);
        }

        if (bytes) {
            e.preventDefault();
            sendKey(bytes);

            const t = terminals[focusedPty];
            if (t && t.echo()) {
                if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    if (!predicted) {
                        predictedFromRow = t.cursor_row;
                        predictedFromCol = t.cursor_col;
                    }
                    predicted += e.key;
                    requestLeadRender();
                } else {
                    predicted = '';
                    requestLeadRender();
                }
            } else {
                predicted = '';
            }
        }
    });

    inputSink.addEventListener('compositionend', (e) => {
        if (e.data && focusedPty !== null) sendKey(new TextEncoder().encode(e.data));
        inputSink.value = '';
    });

    inputSink.addEventListener('input', (e) => {
        if (e.isComposing) {
            // Android fires deleteContentBackward with isComposing=true during IME.

        // Android Backspace fires deleteContentBackward with an empty textarea value.

            sendKey(new TextEncoder().encode(inputSink.value.replace(/\n/g, '\r')));
        }

    });

    canvas.addEventListener('mousedown', (e) => {

            e.preventDefault();
            return;
        }
        if (e.button === 0) {
