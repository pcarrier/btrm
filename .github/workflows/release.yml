name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-debs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/build-debs debs
      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: debs/*.deb

  build-tarballs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x86_64
          - runner: ubuntu-24.04-arm
            label: linux-aarch64
          - runner: macos-latest
            label: macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/build-tarballs dist
      - uses: actions/upload-artifact@v4
        with:
          name: tarballs-${{ matrix.label }}
          path: dist/*.tar.gz

  release:
    needs: [build-debs, build-tarballs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: actions/download-artifact@v4
        with:
          pattern: tarballs-*
          merge-multiple: true
          path: tarballs

      - name: List artifacts
        run: |
          ls -lh debs/
          ls -lh tarballs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debs/*.deb
            tarballs/*.tar.gz
          generate_release_notes: true

  publish-crates:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/publish-crates

  publish-npm:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/publish-npm-packages --provenance --access public

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: indent-com/homebrew-tap
          event-type: update
          client-payload: '{"version": "${{ github.ref_name }}"}'

  apt-repo:
    needs: [build-debs, build-tarballs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: actions/download-artifact@v4
        with:
          pattern: tarballs-*
          merge-multiple: true
          path: tarballs

      - name: Import GPG key
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build APT repo
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev

          mkdir -p repo/pool repo/dists/stable/main/binary-amd64
          mkdir -p repo/dists/stable/main/binary-arm64
          cp debs/*.deb repo/pool/
          cp .github/blit.gpg repo/blit.gpg

          cd repo
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-arm64/Packages

          cat > dists/stable/Release <<'RELEASE'
          Origin: blit
          Label: blit
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          RELEASE
          sed -i 's/^          //' dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release
          gpg --batch --yes --armor --detach-sign --output dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --armor --clearsign --output dists/stable/InRelease dists/stable/Release

      - name: Extract static binaries
        run: |
          for tarball in tarballs/*.tar.gz; do
            filename=$(basename "$tarball" .tar.gz)
            # filename format: {bin}_{version}_{os}_{arch}
            os=$(echo "$filename" | rev | cut -d_ -f2 | rev)
            arch=$(echo "$filename" | rev | cut -d_ -f1 | rev)
            case "$os" in
              darwin) uname_s=Darwin ;;
              linux)  uname_s=Linux ;;
              *)      uname_s="$os" ;;
            esac
            if [ "$os" = "darwin" ] && [ "$arch" = "aarch64" ]; then
              uname_m=arm64
            else
              uname_m="$arch"
            fi
            mkdir -p "repo/$uname_s/$uname_m"
            tar -xzf "$tarball" -C "repo/$uname_s/$uname_m/"
          done
          echo "${GITHUB_REF_NAME}" > repo/REVISION
          echo "Static binaries:"
          find repo/Darwin repo/Linux -type f 2>/dev/null | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - uses: actions/deploy-pages@v4
