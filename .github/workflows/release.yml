name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-debs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/build-debs debs
      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: debs/*.deb

  build-tarballs:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x86_64
          - runner: ubuntu-24.04-arm
            label: linux-aarch64
          - runner: macos-latest
            label: macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: ./bin/build-tarballs dist
      - uses: actions/upload-artifact@v4
        with:
          name: tarballs-${{ matrix.label }}
          path: dist/*.tar.gz

  release:
    needs: [build-debs, build-tarballs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: actions/download-artifact@v4
        with:
          pattern: tarballs-*
          merge-multiple: true
          path: tarballs

      - name: List artifacts
        run: |
          ls -lh debs/
          ls -lh tarballs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debs/*.deb
            tarballs/*.tar.gz
          generate_release_notes: true

  apt-repo:
    needs: [build-debs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - name: Import GPG key
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build APT repo
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev

          mkdir -p repo/pool repo/dists/stable/main/binary-amd64
          mkdir -p repo/dists/stable/main/binary-arm64
          cp debs/*.deb repo/pool/
          cp .github/blit.gpg repo/blit.gpg

          cd repo
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool > dists/stable/main/binary-arm64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-arm64/Packages

          cat > dists/stable/Release <<'RELEASE'
          Origin: blit
          Label: blit
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          RELEASE
          sed -i 's/^          //' dists/stable/Release

          apt-ftparchive release dists/stable >> dists/stable/Release
          gpg --batch --yes --armor --detach-sign --output dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --armor --clearsign --output dists/stable/InRelease dists/stable/Release

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - uses: actions/deploy-pages@v4
