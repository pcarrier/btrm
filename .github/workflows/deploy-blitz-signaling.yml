name: Deploy blitz-signaling

on:
  push:
    branches: [main]
    paths:
      - "ts/blitz-signaling/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix run .#deploy-blitz-signaling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
