version: "0.5"

processes:
  browser-assets:
    command: cargo watch -w browser/src -w remote/src -s "./bin/build-browser"
    availability:
      restart: on_failure
      max_restarts: 0

  server:
    command: cargo watch -w server/src -w remote/src -w wezterm-driver/src -x "run -p blit-server --release"
    availability:
      restart: on_failure
      max_restarts: 0

  gateway:
    command: cargo watch -w gateway/src -w web -x "run -p blit-gateway --release"
    environment:
      - BLIT_PASS=${BLIT_PASS:-dev}
    depends_on:
      browser-assets:
        condition: process_started
      server:
        condition: process_started
    availability:
      restart: on_failure
      max_restarts: 0
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3264
        path: /
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 10
